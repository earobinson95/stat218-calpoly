
<script>
        /* Get the modal*/
          var modaldescriptivestatistics = document.getElementById('modaldescriptivestatistics');
        /* Get the image and insert it inside the modal - use its 'alt' text as a caption*/
          var imgdescriptivestatistics = document.getElementById('imgdescriptivestatistics');
          var modalImgdescriptivestatistics = document.getElementById('imgmodaldescriptivestatistics');
          var captionTextdescriptivestatistics = document.getElementById('captiondescriptivestatistics');
          imgdescriptivestatistics.onclick = function(){
            modaldescriptivestatistics.style.display = 'block';
            modalImgdescriptivestatistics.src = this.src;
            captionTextdescriptivestatistics.innerHTML = this.alt;
          }
          /* When the user clicks on the modalImg, close it*/
          modalImgdescriptivestatistics.onclick = function() {
            modaldescriptivestatistics.style.display = 'none';
          }
</script>
